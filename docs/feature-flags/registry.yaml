    created: 2025-09-10
    expires: 2026-03-01
    status: pilot
    default: false
    pilot: true
    production: staged
    description: "Enables Google OAuth, Merchant Center, and GBP integration (ENH-2026-044)"
    rollout_percentage: 15
    environments:
      staging: true
      pilot: true
      production: false
    dependencies:
      - FF_BUSINESS_PROFILE
    metrics:
      - oauth_success_rate
      - oauth_error_rate
